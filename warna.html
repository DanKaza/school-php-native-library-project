<!DOCTYPE html>
<html>
<head>
  <title>Warna</title>
</head>
<link rel="stylesheet" type="text/css" href="css/grade1.css">
<body>
  <h1 class="text-gradient">Contoh CSS Gradient</h1>
  <div class="grid"> 
    <div class="card">
      <div class="grad-linear"></div>
      <div class="label">Linear Gradient (horizontal)</div>
    </div>
    <div class="card">
      <div class="grad-linear-diagonal"></div>
      <div class="label">Linear Gradient (diagonal, multi warna)</div>
    </div>
    <div class="card">
      <div class="grad-radial"></div>
      <div class="label">Radial Gradient</div>
    </div>
    <div class="card">
      <div class="grad-conic"></div>
      <div class="label">Conic Gradient</div>
    </div>
    <div class="card">
      <div class="grad-animated"></div>
      <div class="label">Animated Gradient</div>
    </div>
    <div class="card border-gradient">
      Border dengan gradient + isi solid
</div>
</div>
</body>
</html>
